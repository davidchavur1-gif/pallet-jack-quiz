<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Fundamentos de Programación</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f4ff;--white:#fff;--green:#58cc02;--green2:#46a302;--blue:#1cb0f6;--blue2:#0b8fc2;--purple:#ce82ff;--purple2:#9b59b6;--red:#ff4b4b;--orange:#ff9600;--yellow:#ffc800;--pink:#ff6b9d;--teal:#00b8a9;--text:#3c3c3c;--muted:#afafaf;--border:#e5e5e5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.cp{position:fixed;top:-14px;border-radius:3px;animation:cfall linear forwards;pointer-events:none;z-index:9999}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
nav{background:var(--white);border-bottom:2px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.nav-logo{font-size:17px;font-weight:900;color:var(--purple)}
.nav-logo span{color:var(--blue)}
.nav-pills{display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:5px;background:var(--bg);border:2px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:800}
.screen{display:none;padding:24px;max-width:760px;margin:auto}
.screen.active{display:block}
.home-top{text-align:center;padding:28px 0 20px}
.home-top h1{font-size:28px;font-weight:900;margin-bottom:6px}
.home-top p{font-size:14px;color:var(--muted);margin-bottom:20px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-n{font-size:26px;font-weight:900}
.stat-l{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.topic-card{background:var(--white);border:2px solid var(--border);border-radius:18px;padding:22px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.topic-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.1)}
.topic-icon{font-size:34px;margin-bottom:10px;display:block}
.topic-title{font-size:15px;font-weight:900;margin-bottom:4px}
.topic-desc{font-size:12px;color:var(--muted)}
.topic-count{font-size:11px;font-weight:800;margin-top:8px;padding:3px 10px;border-radius:10px;display:inline-block}
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.back-btn{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;color:var(--text);flex-shrink:0}
.back-btn:hover{background:var(--border)}
.prog-wrap{flex:1}
.prog-bar-wrap{height:14px;background:var(--bg);border-radius:7px;overflow:hidden;border:2px solid var(--border)}
.prog-bar{height:100%;border-radius:5px;transition:width 0.5s ease}
.score-box{display:flex;align-items:center;gap:5px;background:var(--bg);border:2px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:800;color:var(--orange);flex-shrink:0}
.timer-wrap{height:12px;background:var(--bg);border-radius:6px;overflow:hidden;border:2px solid var(--border);margin-bottom:12px}
#tbar{height:100%;border-radius:4px;transition:width 0.1s linear;background:linear-gradient(90deg,var(--green),#78e505)}
#tbar.warn{background:linear-gradient(90deg,var(--orange),var(--yellow))}
#tbar.danger{background:linear-gradient(90deg,var(--red),#ff8080);animation:tpulse 0.4s infinite alternate}
@keyframes tpulse{from{opacity:1}to{opacity:0.5}}
#streak-disp{text-align:center;font-size:18px;font-weight:900;color:var(--orange);min-height:28px;margin-bottom:8px}
#streak-disp.pop{animation:spop 0.4s ease}
@keyframes spop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.quiz-card{background:var(--white);border:2px solid var(--border);border-radius:18px;padding:24px;margin-bottom:14px;box-shadow:0 4px 0 var(--border)}
.quiz-tag{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;padding:4px 12px;border-radius:20px;display:inline-block}
.quiz-q{font-size:17px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.4}
.quiz-code{background:#1e1e2e;color:#cdd6f4;font-family:'Courier New',monospace;font-size:12px;border-radius:10px;padding:12px 14px;margin:10px 0;line-height:1.7;border-left:3px solid var(--purple);white-space:pre}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{padding:13px 18px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--white);text-align:left;font-family:'Nunito',sans-serif;transition:all 0.15s;color:var(--text);line-height:1.4;width:100%}
.quiz-opt:hover:not(:disabled){border-color:var(--blue);background:#f0f8ff;transform:translateX(4px)}
.quiz-opt.correct{background:#d7ffb8;border-color:var(--green);color:var(--green2)}
.quiz-opt.wrong{background:#ffd5d5;border-color:var(--red);color:#cc3c3c}
.quiz-opt.reveal{background:#d7ffb8;border-color:var(--green);color:var(--green2);opacity:0.6}
.quiz-opt:disabled{cursor:default}
.quiz-fb{padding:13px 16px;border-radius:12px;font-size:14px;font-weight:700;margin-top:12px;display:none;line-height:1.5}
.quiz-fb.show{display:block}
.qf-ok{background:#d7ffb8;color:var(--green2);border-left:4px solid var(--green)}
.qf-bad{background:#ffd5d5;color:#cc3c3c;border-left:4px solid var(--red)}
.next-btn{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.15s;margin-top:10px;color:white}
.next-btn:hover{transform:translateY(-2px)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:14px;font-weight:800;padding:11px 22px;border-radius:24px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:600;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){.topics-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}.screen{padding:16px}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">⚡ Fundamentos <span>Programación</span></div>
  <div class="nav-pills">
    <div class="pill" style="color:var(--orange)">⭐ <span id="xp-nav">0</span> XP</div>
    <div class="pill" style="color:var(--red)">🔥 <span id="str-nav">0</span></div>
    <div class="pill" style="color:var(--green)">✅ <span id="done-nav">0</span></div>
  </div>
</nav>

<div class="screen active" id="screen-home">
  <div class="home-top">
    <h1>⚡ Fundamentos de Programación</h1>
    <p>Elige un tema y pon a prueba lo que sabes. Timer, rachas y sonidos incluidos.</p>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-n" style="color:var(--orange)" id="h-xp">0</div><div class="stat-l">⭐ XP Total</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--red)" id="h-str">0</div><div class="stat-l">🔥 Racha máx.</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--green)" id="h-acc">—</div><div class="stat-l">🎯 Precisión</div></div>
  </div>
  <div class="topics-grid" id="topics-grid"></div>
</div>

<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Volver</button>
    <div class="prog-wrap">
      <div class="prog-bar-wrap"><div class="prog-bar" id="q-prog" style="width:0%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:700;margin-top:3px">
        <span id="q-count">Pregunta 1</span>
        <span id="q-topic-label"></span>
      </div>
    </div>
    <div class="score-box">⭐ <span id="q-score">0</span></div>
  </div>
  <div id="streak-disp"></div>
  <div class="timer-wrap"><div id="tbar"></div></div>
  <div id="quiz-area"></div>
</div>
<div id="toast"></div>

<script>
var AC=new(window.AudioContext||window.webkitAudioContext)();
function rac(){if(AC.state==='suspended')AC.resume();}
function bip(f,d,t,v){rac();t=t||'sine';v=v||0.2;var o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}
function sOk(){bip(523,0.08);setTimeout(function(){bip(659,0.08)},80);setTimeout(function(){bip(784,0.12)},160);setTimeout(function(){bip(1047,0.16)},240);}
function sFail(){bip(280,0.1,'sawtooth',0.2);setTimeout(function(){bip(200,0.2,'sawtooth',0.15)},110);}
function sTick(){bip(900,0.03,'square',0.06);}
function sWin(){var ff=[523,659,784,1047,1319];for(var i=0;i<ff.length;i++){(function(f,i){setTimeout(function(){bip(f,0.12,'sine',0.2)},i*80)})(ff[i],i);}}
function sStr(){bip(880,0.06);setTimeout(function(){bip(1100,0.08)},70);}

function confetti(n){
  n=n||40;var c=['#58cc02','#1cb0f6','#ff9600','#ce82ff','#ff4b4b','#ffc800'];
  for(var i=0;i<n;i++){var el=document.createElement('div');el.className='cp';var sz=8+Math.random()*8;el.style.cssText='left:'+Math.random()*100+'vw;background:'+c[Math.floor(Math.random()*c.length)]+';width:'+sz+'px;height:'+sz+'px;animation-duration:'+(1.5+Math.random()*2)+'s;animation-delay:'+Math.random()*0.4+'s;border-radius:'+(Math.random()>0.5?'50%':'3px');document.body.appendChild(el);setTimeout(function(e){e.remove()},4000,el);}
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200);}

var ST={xp:0,streak:0,totalA:0,totalC:0};
try{var ss=localStorage.getItem('fprog3');if(ss)ST=Object.assign(ST,JSON.parse(ss));}catch(e){}
function saveS(){try{localStorage.setItem('fprog3',JSON.stringify(ST));}catch(e){}}
function updUI(){document.getElementById('xp-nav').textContent=ST.xp;document.getElementById('str-nav').textContent=ST.streak;document.getElementById('done-nav').textContent=ST.totalC;document.getElementById('h-xp').textContent=ST.xp;document.getElementById('h-str').textContent=ST.streak;document.getElementById('h-acc').textContent=ST.totalA?Math.round(ST.totalC/ST.totalA*100)+'%':'—';}

var TOPICS=[
{id:'comp',title:'Compiladores e Intérpretes',icon:'⚙️',color:'#1cb0f6',color2:'#0b8fc2',questions:[
{q:'¿Cuál de los siguientes lenguajes utiliza un intérprete para su ejecución?',opts:['Java','Python','C++'],correct:1,fb:'Python usa intérprete — ejecuta línea por línea. Java usa bytecode+JVM. C++ compila a código máquina.'},
{q:'¿Qué ventaja tiene un compilador sobre un intérprete?',opts:['Permite ejecutar el programa línea por línea.','La velocidad de ejecución suele ser mayor, ya que el código se compila una sola vez.','Reduce el tamaño del código fuente.'],correct:1,fb:'El compilador traduce TODO el código antes de ejecutarlo → más rápido porque no hay traducción en tiempo real.'},
{q:'¿Cuál es la principal diferencia entre un intérprete y un compilador?',opts:['Un intérprete traduce línea por línea durante la ejecución, mientras que un compilador traduce todo el código antes de ejecutarlo.','El intérprete convierte el código a lenguaje máquina, mientras que el compilador genera bytecode.','Un compilador solo funciona con lenguajes de bajo nivel.'],correct:0,fb:'Intérprete = traduce mientras ejecuta (línea a línea). Compilador = traduce todo primero, luego ejecuta.'},
{q:'¿Qué es la programación por bloques?',opts:['Un enfoque visual donde los usuarios arrastran y conectan bloques que representan instrucciones.','Un método que utiliza piezas de código ya compilado.','Un lenguaje basado en estructuras condicionales.'],correct:0,fb:'Scratch es el ejemplo más conocido. Bloques visuales = instrucciones. Ideal para aprender sin sintaxis.'},
{q:'¿Cuál fue uno de los primeros lenguajes de alto nivel creado en los años 1950?',opts:['Java','Fortran','Python'],correct:1,fb:'Fortran (1957) diseñado para cálculos científicos. Java es de 1995 y Python de 1991.'},
{q:'¿Cuál es la principal función de un algoritmo?',opts:['Generar directamente el ejecutable del programa.','Resolver un problema dividiendo el código en módulos.','Definir un conjunto de pasos ordenados para solucionar un problema.'],correct:2,fb:'Un algoritmo es una secuencia de pasos ordenados y finitos para resolver un problema.'}
]},
{id:'soft',title:'Ciclo de Vida del Software',icon:'🔄',color:'#58cc02',color2:'#46a302',questions:[
{q:'¿Cuál programa es más adecuado para gestionar el control de versiones?',opts:['GIT','Visual Studio Code','Microsoft Excel'],correct:0,fb:'GIT es el sistema de control de versiones más usado del mundo. VS Code es editor. Excel es hoja de cálculo.'},
{q:'¿En qué fase del ciclo de vida se realiza la detección de errores y pruebas funcionales?',opts:['Análisis de requisitos','Mantenimiento','Pruebas'],correct:2,fb:'La fase de Pruebas (Testing) es donde se detectan errores y se verifica que el software cumple los requisitos.'},
{q:'¿Cuál de los siguientes es un ejemplo de error lógico?',opts:['La división entre cero genera una excepción.','El programa calcula mal una suma pero no genera error.','La aplicación no compila debido a un error de sintaxis.'],correct:1,fb:'Error lógico = el programa funciona pero da resultados incorrectos. No da ningún error visible — el más difícil de detectar.'},
{q:'¿Cuál es la principal diferencia entre lenguajes declarativos e imperativos?',opts:['Los imperativos describen paso a paso las instrucciones, mientras que los declarativos solo especifican el resultado deseado.','Los declarativos se enfocan en el como, mientras que los imperativos en el qué.','Los imperativos son siempre más lentos que los declarativos.'],correct:0,fb:'Imperativo = describes CÓMO hacerlo (paso a paso). Declarativo = describes QUÉ quieres (SQL es declarativo).'}
]},
{id:'oper',title:'Operadores y Arrays',icon:'🔢',color:'#ce82ff',color2:'#9b59b6',questions:[
{q:'¿Qué valor produce la expresión (5 > 3) && (2 < 4)?',opts:['false','true','null'],correct:1,fb:'(5>3) = true y (2<4) = true. Con && (AND) ambas deben ser true → resultado true.'},
{q:'Si a = 5 y b = 2, ¿cuál es el resultado de a % b?',opts:['1','0','3'],correct:0,fb:'% es el módulo (resto). 5 ÷ 2 = 2 con resto 1. El módulo devuelve el RESTO de la división.'},
{q:'Si numeros = [3, 5, 7, 9, 11], ¿qué devuelve numeros[2]?',opts:['7','3','5'],correct:0,fb:'Los arrays empiezan en índice 0. numeros[0]=3, numeros[1]=5, numeros[2]=7.',code:'numeros = [3, 5, 7, 9, 11]\nprint(numeros[2])  # → 7'},
{q:'¿Qué es un array en programación?',opts:['Una variable que almacena solo un valor a la vez','Una estructura de datos que almacena múltiples valores del mismo tipo en una sola variable','Una estructura de control para repetir código'],correct:1,fb:'Un array es una colección ordenada de elementos. En Python se llaman listas.'},
{q:'¿Qué es una función en programación?',opts:['Una estructura que repite código de forma indefinida','Un bucle que solo se ejecuta una vez','Un bloque de código que realiza una tarea específica y puede reutilizarse'],correct:2,fb:'Las funciones permiten REUTILIZAR código. Se definen una vez y se llaman múltiples veces.'},
{q:'¿Qué función cumple la estructura if-else?',opts:['Repite un bloque de código hasta que se cumpla una condición','Ejecuta un bloque de código un número determinado de veces','Evalúa una condición y permite ejecutar diferentes bloques según si es verdadera o falsa'],correct:2,fb:'if-else = estructura condicional. true → bloque if. false → bloque else.'},
{q:'¿Cuál es la diferencia entre un tipo entero y un tipo flotante?',opts:['Un flotante almacena caracteres, y un entero solo números','Un entero almacena números sin decimales, mientras que un flotante incluye decimales','Ambos pueden almacenar números con decimales'],correct:1,fb:'int = enteros sin decimales (1, 2, -5). float = números con decimales (3.14, -0.5).'},
{q:'¿Cuál es la principal diferencia entre for y while?',opts:['for se usa cuando se conoce el número de iteraciones y while se usa para condiciones','No hay diferencia, ambos repiten código.','for se usa para condiciones indefinidas y while para condiciones definidas'],correct:0,fb:'for = número de iteraciones conocido. while = se repite mientras una condición sea true.'}
]},
{id:'pyvar',title:'Python — Variables y Listas',icon:'🐍',color:'#ff9600',color2:'#cc7a00',questions:[
{q:'¿Qué es una variable en Python?',opts:['Una constante cuyo valor no puede cambiar','Un contenedor para almacenar datos que puede cambiar durante la ejecución','Una función que devuelve un valor'],correct:1,fb:'Una variable es un espacio en memoria con nombre. Su valor puede cambiar: x=5 luego x=10.'},
{q:'¿Cuál es una regla para nombrar variables en Python?',opts:['Deben comenzar con una letra o un guion bajo','Pueden contener espacios en su nombre','Pueden comenzar con un número'],correct:0,fb:'Reglas Python: empezar con letra o _, sin espacios. Válido: mi_var, _dato. Inválido: 2var, mi var.'},
{q:'¿Qué tipo de dato es x después de: x = 3.14',opts:['str','int','float'],correct:2,fb:'3.14 tiene decimales → float. x=3 sería int. x="3.14" sería str.',code:'x = 3.14\nprint(type(x))  # float'},
{q:'¿Qué hace mi_lista.append(4) si mi_lista = [1, 2, 3]?',opts:['Inserta el 4 al principio','Añade el 4 al final.','Sustituye el último elemento por 4'],correct:1,fb:'append() siempre añade al FINAL. Resultado: [1, 2, 3, 4]',code:'mi_lista = [1, 2, 3]\nmi_lista.append(4)\nprint(mi_lista)  # [1, 2, 3, 4]'},
{q:'¿Cómo accedes al segundo elemento de la lista nombres?',opts:['nombres[2]','nombres[1]','nombres[-1]'],correct:1,fb:'Índice 0 = primer elemento. Índice 1 = segundo. nombres[-1] = último.',code:'nombres = ["Ana", "Luis", "Eva"]\nprint(nombres[1])  # Luis'},
{q:'¿Cuál es la salida de mi_lista[1:4] si mi_lista = [1, 2, 3, 4, 5]?',opts:['[1, 2, 3]','[1, 2, 3, 4]','[2, 3, 4]'],correct:2,fb:'Slicing [1:4] = desde índice 1 hasta 4 sin incluirlo. Índices 1,2,3 = valores 2,3,4.',code:'mi_lista = [1, 2, 3, 4, 5]\nprint(mi_lista[1:4])  # [2, 3, 4]'},
{q:'¿Qué devuelve len([5, 10, 15])?',opts:['3','15','2'],correct:0,fb:'len() devuelve el número de elementos. [5,10,15] tiene 3 elementos → len()=3.',code:'mi_lista = [5, 10, 15]\nprint(len(mi_lista))  # 3'}
]},
{id:'struct',title:'Estructuras de Datos',icon:'📦',color:'#00b8a9',color2:'#008a80',questions:[
{q:'¿Es posible usar una lista como clave en un diccionario?',opts:['No, porque las claves deben ser inmutables y las listas son mutables.','Sí, siempre que no cambies la lista después.','No, porque los diccionarios solo aceptan enteros como claves.'],correct:0,fb:'Las claves de un diccionario deben ser INMUTABLES. Las listas son mutables → TypeError si las usas como clave.'},
{q:'¿Son las cadenas de texto en Python inmutables?',opts:['Sí, porque cualquier modificación genera una nueva cadena sin alterar la original.','Sí, pero solo si la cadena tiene menos de 256 caracteres.','No, porque puedes usar métodos como replace para modificarlas.'],correct:0,fb:'Las strings son INMUTABLES. s.replace() devuelve una NUEVA cadena, no modifica la original.',code:'s = "hola"\ns2 = s.replace("h","H")\nprint(s)   # hola\nprint(s2)  # Hola'},
{q:'¿Cómo se diferencia una tupla de una lista?',opts:['Es una lista que solo puede contener números','Es una estructura de datos que puede modificarse','Es similar pero es inmutable'],correct:2,fb:'Tupla = inmutable. Lista = mutable. Tupla: (1,2,3). Lista: [1,2,3].',code:'lista = [1, 2, 3]  # mutable\ntupla = (1, 2, 3)  # inmutable\nlista[0] = 99      # OK\ntupla[0] = 99      # TypeError'},
{q:'¿Qué método convierte una cadena en lista de palabras?',opts:['partition()','split()','join()'],correct:1,fb:'split() divide en lista según un delimitador. join() hace lo contrario (une lista en cadena).',code:'"hola mundo".split()   # ["hola","mundo"]\n"a,b,c".split(",")     # ["a","b","c"]'},
{q:'¿Qué métodos usas para iterar sobre un diccionario?',opts:['get(), set(), update()','keys(), values(), items()','append(), extend(), pop()'],correct:1,fb:'keys() → claves, values() → valores, items() → pares (clave,valor).',code:'d = {"a":1,"b":2}\nd.keys()    # dict_keys(["a","b"])\nd.values()  # dict_values([1,2])\nd.items()   # dict_items([("a",1),("b",2)])'},
{q:'¿Cuál es la ventaja de usar un set en lugar de una lista?',opts:['Los sets permiten almacenar valores duplicados.','Los sets son más fáciles de ordenar.','Los sets tienen una búsqueda más rápida gracias a su implementación basada en hash.'],correct:2,fb:'Set usa hash → búsqueda O(1) vs lista O(n). Los sets NO permiten duplicados.',code:'mi_set = {1,2,3,2,1}\nprint(mi_set)  # {1,2,3}'},

function buildHome(){
  var grid=document.getElementById('topics-grid');
  grid.innerHTML='';
  for(var i=0;i<TOPICS.length;i++){
    (function(t,idx){
      var card=document.createElement('div');
      card.className='topic-card';
      card.style.borderBottom='4px solid '+t.color;
      card.innerHTML='<span class="topic-icon">'+t.icon+'</span><div class="topic-title" style="color:'+t.color+'">'+t.title+'</div><div class="topic-desc" style="margin-top:4px">'+t.questions.length+' preguntas</div><span class="topic-count" style="background:'+t.color+'22;color:'+t.color+'">Empezar →</span>';
      card.onclick=function(){startTopic(idx);};
      grid.appendChild(card);
    })(TOPICS[i],i);
  }
}

var curT=null,qs=[],qI=0,qSc=0,qStr=0,qTv=100,qTmr=null,qCor=0;

function startTopic(idx){
  curT=TOPICS[idx];
  qs=curT.questions.slice().sort(function(){return Math.random()-0.5;});
  qI=0;qSc=0;qStr=0;qCor=0;
  document.getElementById('q-score').textContent=0;
  document.getElementById('streak-disp').textContent='';
  document.getElementById('q-topic-label').textContent=curT.title;
  document.getElementById('q-prog').style.background='linear-gradient(90deg,'+curT.color+','+curT.color+'99)';
  document.getElementById('screen-home').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  showQ();
}

function goHome(){
  clearInterval(qTmr);
  document.getElementById('screen-quiz').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
  updUI();
}

function showQ(){
  if(qI>=qs.length){endQuiz();return;}
  var q=qs[qI];
  document.getElementById('q-prog').style.width=Math.round(qI/qs.length*100)+'%';
  document.getElementById('q-count').textContent='Pregunta '+(qI+1)+' de '+qs.length;
  var codeHtml=q.code?'<div class="quiz-code">'+escHtml(q.code)+'</div>':'';
  var optsHtml='';
  for(var i=0;i<q.opts.length;i++){
    optsHtml+='<button class="quiz-opt" onclick="ansQ('+i+')">'+String.fromCharCode(65+i)+'. '+q.opts[i]+'</button>';
  }
  document.getElementById('quiz-area').innerHTML=
    '<div class="quiz-card">'+
      '<span class="quiz-tag" style="background:'+curT.color+'22;color:'+curT.color+'">'+curT.icon+' '+curT.title+'</span>'+
      '<div class="quiz-q">'+q.q.replace(/\n/g,'<br>')+'</div>'+
      codeHtml+
    '</div>'+
    '<div class="quiz-opts" id="qopts">'+optsHtml+'</div>'+
    '<div class="quiz-fb" id="qfb"></div>'+
    '<button class="next-btn" id="qnxt" onclick="nextQ()" style="display:none;background:'+curT.color+';box-shadow:0 4px 0 '+curT.color2+'">Siguiente →</button>';
  startTimer();
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function startTimer(){
  clearInterval(qTmr);qTv=100;
  var bar=document.getElementById('tbar');
  bar.style.width='100%';bar.className='';
  var ticks=0;
  qTmr=setInterval(function(){
    qTv-=0.5;ticks++;
    bar.style.width=qTv+'%';
    if(qTv<50&&qTv>=25)bar.className='warn';
    if(qTv<25){bar.className='danger';if(ticks%6===0)sTick();}
    if(qTv<=0){clearInterval(qTmr);timeUp();}
  },100);
}

function timeUp(){
  var q=qs[qI];
  document.querySelectorAll('.quiz-opt').forEach(function(b,i){b.disabled=true;if(i===q.correct)b.classList.add('reveal');});
  sFail();qStr=0;updStreak();ST.totalA++;
  var fb=document.getElementById('qfb');
  fb.innerHTML='⏱ Tiempo. '+q.fb;fb.className='quiz-fb qf-bad show';
  document.getElementById('qnxt').style.display='block';
}

function ansQ(chosen){
  clearInterval(qTmr);var q=qs[qI];ST.totalA++;
  document.querySelectorAll('.quiz-opt').forEach(function(b,i){
    b.disabled=true;
    if(i===q.correct)b.classList.add('correct');
    else if(i===chosen&&chosen!==q.correct)b.classList.add('wrong');
  });
  var fb=document.getElementById('qfb');
  if(chosen===q.correct){
    var pts=Math.round(30+qTv*0.7);qSc+=pts;qStr++;qCor++;ST.totalC++;
    sOk();if(qStr>=3)confetti(20);updStreak();
    document.getElementById('q-score').textContent=qSc;
    fb.innerHTML='✅ Correcto! +'+pts+' XP — '+q.fb;fb.className='quiz-fb qf-ok show';
  } else {
    qStr=0;sFail();updStreak();
    fb.innerHTML='❌ Incorrecto. '+q.fb;fb.className='quiz-fb qf-bad show';
  }
  document.getElementById('qnxt').style.display='block';
}

function updStreak(){
  var el=document.getElementById('streak-disp');
  if(qStr>=2){
    var f='';for(var i=0;i<Math.min(qStr,5);i++)f+='🔥';
    el.textContent=f+' Racha x'+qStr+'!';
    el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
    ST.streak=Math.max(ST.streak,qStr);sStr();
  } else el.textContent='';
}

function nextQ(){qI++;showQ();}

function endQuiz(){
  var pct=Math.round(qCor/qs.length*100);
  ST.xp+=qSc;saveS();updUI();
  if(pct>=80){confetti(80);sWin();}
  var topicIdx=TOPICS.indexOf(curT);
  document.getElementById('quiz-area').innerHTML=
    '<div style="background:white;border:2px solid #e5e5e5;border-radius:18px;padding:32px;text-align:center;box-shadow:0 4px 0 #e5e5e5">'+
      '<div style="font-size:48px;margin-bottom:12px">'+(pct>=80?'🏆':pct>=50?'👍':'📚')+'</div>'+
      '<div style="font-size:20px;font-weight:900;margin-bottom:6px">'+(pct>=80?'¡Excelente!':pct>=50?'¡Bien hecho!':'Repasa y vuelve a intentarlo.')+'</div>'+
      '<div style="font-size:14px;color:#afafaf;margin-bottom:20px">'+qCor+'/'+qs.length+' correctas · '+pct+'% precisión</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">'+
        '<div style="background:#f0f4ff;border-radius:12px;padding:12px"><div style="font-size:22px;font-weight:900;color:#ff9600">'+qSc+'</div><div style="font-size:11px;color:#afafaf;font-weight:700">XP ganado</div></div>'+
        '<div style="background:#f0f4ff;border-radius:12px;padding:12px"><div style="font-size:22px;font-weight:900;color:#58cc02">'+qCor+'/'+qs.length+'</div><div style="font-size:11px;color:#afafaf;font-weight:700">Correctas</div></div>'+
        '<div style="background:#f0f4ff;border-radius:12px;padding:12px"><div style="font-size:22px;font-weight:900;color:'+curT.color+'">'+pct+'%</div><div style="font-size:11px;color:#afafaf;font-weight:700">Precisión</div></div>'+
      '</div>'+
      '<div style="display:flex;gap:10px;justify-content:center">'+
        '<button onclick="startTopic('+topicIdx+')" style="background:'+curT.color+';color:white;border:none;border-radius:12px;padding:12px 22px;font-size:14px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;box-shadow:0 4px 0 '+curT.color2+'">🔄 Repetir</button>'+
        '<button onclick="goHome()" style="background:#f0f4ff;color:#3c3c3c;border:2px solid #e5e5e5;border-radius:12px;padding:12px 22px;font-size:14px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif">🏠 Inicio</button>'+
      '</div>'+
    '</div>';
  document.getElementById('q-prog').style.width='100%';
  showToast('⭐ +'+qSc+' XP añadidos!');
}

buildHome();
updUI();
document.addEventListener('click',rac,{once:true});
</script>
